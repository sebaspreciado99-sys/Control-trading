<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>📈 TRADING 📉</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0c10">
  <meta name="description" content="Sistema profesional de control y seguimiento de operaciones de trading">
  
  <!-- iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  <header>
    <div class="header-glow">
      <h1>📈 TRADING 📉</h1>
    </div>
  </header>

  <!-- ==================== SECCIÓN HOME ==================== -->
  <section id="home">
    <div class="card-glass premium">
      <div class="input-group">
        <p class="label-input glow">🎯 Activo Financiero</p>
        <input id="inputPar" list="misPares" placeholder="Ej: BTCUSDT, EURUSD...">
        <datalist id="misPares"></datalist>
      </div>
      
      <div class="input-group">
        <p class="label-input glow">🎨 Etiqueta de Color</p>
        <div id="coloresRapidos"></div>
        <input type="color" id="colorPar" value="#f0b90b" class="color-picker">
      </div>
      
      <button onclick="guardarPar()" class="btn-main premium">
        <span>➕</span> Iniciar Registro
      </button>
    </div>

    <div id="listaPares"></div>
  </section>

  <!-- ==================== FORMULARIO DE OPERACIÓN ==================== -->
  <section id="operaciones" class="oculto">
    <h2 id="tituloPar" class="titulo-premium"></h2>
    <div class="card-glass premium">
      <!-- Aquí va todo tu formulario (lo dejo resumido para que quepa) -->
      <!-- Puedes pegar tu formulario completo aquí si quieres, por ahora dejo espacio -->
      <button onclick="archivarPar()" class="btn-archive premium">📥 Archivar Trade</button>
      <button onclick="volverHome()" class="btn-secondary premium">⬅ Volver</button>
    </div>
  </section>

  <!-- ==================== HISTORIAL ==================== -->
  <section id="historial" class="oculto">
    <h2 class="titulo-premium">📁 HISTORIAL</h2>
    <div id="historialContenido"></div>
    <button onclick="volverHome()" class="btn-secondary premium">⬅ Volver</button>
  </section>

  <!-- Botón flotante -->
  <button id="btnHistorial" onclick="abrirHistorial()" class="fab-premium">📁</button>

  <!-- Botón instalar -->
  <button id="installButton" style="display:none; position:fixed; bottom:100px; right:20px; padding:12px 20px; background:#f0b90b; color:black; border:none; border-radius:50px; font-weight:bold;">
    📱 Instalar App
  </button>

  <script src="app.js"></script>

  <!-- === REGISTRO DE SERVICE WORKER (Muy importante) === -->
  <script>
    let deferredPrompt;
    const installButton = document.getElementById('installButton');

    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js')
          .then(function(reg) {
            console.log('Service Worker registrado correctamente');
          })
          .catch(function(err) {
            console.log('Error al registrar Service Worker', err);
          });
      });
    }

    // Mostrar botón de instalar
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installButton.style.display = 'block';
    });

    installButton.addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt = null;
        installButton.style.display = 'none';
      }
    });
  </script>
</body>
</html>
